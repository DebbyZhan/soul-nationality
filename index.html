<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>靈魂國籍測驗 🌍</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@twemoji/api@14.1.0/dist/twemoji.min.js"></script>
    
    <style>
        :root {
            --primary-peach: #FF8A65;    /* 標題與按鈕的蜜桃橘 */
            --light-peach: #FFF1EE;      /* 卡片背景的極淺蜜桃色 */
            --coffee-brown: #5D4037;     /* 咖啡色（子標題與主要文字） */
            --soft-bg: #FFF9F2;          /* 全域背景色 */
            --sub-text: #8D6E63;         /* 副標題的淺咖啡色 */
        }

        body {
            background-color: var(--soft-bg);
            font-family: 'Helvetica Neue', Arial, 'LiHei Pro', "微軟正黑體", sans-serif;
            color: var(--coffee-brown);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background-color: white;
            border-radius: 35px;
            padding: 45px 30px;
            box-shadow: 0 15px 40px rgba(255, 171, 145, 0.12);
            text-align: center;
            max-width: 420px;
            width: 100%;
            border: 5px solid #FFF1E6;
            min-height: 420px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        h1 { font-size: 30px; margin-bottom: 12px; color: var(--primary-peach); letter-spacing: 1px; }
        .subtitle { font-size: 16px; color: var(--sub-text); margin-bottom: 35px; opacity: 0.8; }

        /* 下拉選單 */
        select {
            width: 100%;
            padding: 16px;
            font-size: 18px;
            border: 2px solid #E3F2FD;
            border-radius: 20px;
            background-color: #FAFAFA;
            color: var(--coffee-brown);
            margin-bottom: 25px;
            outline: none;
            cursor: pointer;
            appearance: none;
            text-align: center;
        }

        /* 主按鈕 */
        button.main-btn {
            background-color: var(--primary-peach);
            color: white;
            border: none;
            padding: 18px 20px;
            font-size: 19px;
            font-weight: bold;
            border-radius: 50px;
            width: 100%;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 6px 15px rgba(255, 171, 145, 0.3);
        }
        button.main-btn:hover { transform: scale(1.03); background-color: #FF7043; }

        /* --- 動畫舞台區 --- */
        #animation-stage {
            display: none;
            padding: 20px 0;
        }
        .loading-text {
            font-size: 18px;
            color: var(--primary-peach);
            margin-top: 25px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .giant-sticker {
            font-size: 80px;
            background: white;
            width: 130px;
            height: 130px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            border: 5px solid #FFF; 
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            position: relative;
            animation: slowBounceIn 1.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        @keyframes slowBounceIn {
            0% { opacity: 0; transform: scale(0.3) translateY(50px); }
            50% { opacity: 1; transform: scale(1.1) translateY(-10px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* --- 最終結果區 --- */
        #final-result {
            display: none;
            animation: fadeIn 0.8s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 靈魂國籍標題：統一咖啡色 */
        .result-title { 
            font-size: 28px; 
            font-weight: bold; 
            margin-bottom: 18px; 
            color: var(--coffee-brown); 
        }
        
        /* 結果卡片：統一固定顏色（淺蜜桃色） */
        .result-desc { 
            font-size: 17px; 
            line-height: 1.7; 
            margin-bottom: 25px; 
            padding: 22px; 
            border-radius: 22px; 
            text-align: left;
            background-color: var(--light-peach);
            color: var(--coffee-brown);
        }

        .illustration-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .sticker {
            font-size: 52px;
            background: white;
            width: 85px;
            height: 85px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            border: 4px solid #FFF; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.08);
        }

        img.emoji { height: 1em; width: 1em; margin: 0 .05em 0 .1em; vertical-align: -0.1em; }
        .reset-link { display: inline-block; margin-top: 10px; color: var(--primary-peach); text-decoration: none; font-size: 15px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <div id="header-area">
            <h1>靈魂國籍測驗 🌍</h1>
            <p class="subtitle">嘿，你的生理時鐘其實住在哪一國？</p>
        </div>

        <div id="input-area">
            <select id="sleep-time">
                <option value="" disabled selected>— 請選擇睡覺時間 —</option>
                <option value="21">21:00 - 22:00</option>
                <option value="23">22:00 - 00:00</option>
                <option value="0">00:00 - 01:00</option>
                <option value="2">02:00 - 03:00</option>
                <option value="4">04:00 - 05:00</option>
                <option value="6">06:00 - 07:00</option>
                <option value="8">08:00 - 09:00</option>
                <option value="10">10:00 - 12:00</option>
                <option value="13">13:00 - 15:00</option>
                <option value="16">16:00 - 18:00</option>
                <option value="19">19:00 - 20:00</option>
            </select>
            <button class="main-btn" onclick="calculateResult()">揭曉我的靈魂國籍</button>
        </div>

        <div id="animation-stage">
            <div class="giant-sticker" id="anim-flag">🏳️</div>
            <div class="loading-text">您的靈魂國籍是...</div>
        </div>

        <div id="final-result">
            <div class="result-title" id="result-name">讀取中...</div>
            <div class="result-desc" id="result-text">載入建議中...</div>
            
            <div class="illustration-container">
                <div class="sticker" id="res-flag">🏳️</div>
                <div class="sticker" id="res-icon">🗺️</div>
            </div>
            
            <span class="reset-link" onclick="resetTest()">↺ 再測一次</span>
        </div>
    </div>

    <script>
        const resultsData = {
            "21": { flag: "🇯🇵", icon: "🌸", name: "日本溫泉鄉", text: "貼心建議您睡前多喝杯熱牛奶。能在這喧囂的時代保持如此珍稀的初老作息，這份心如止水真是令人羨慕呢。" },
            "23": { flag: "🇹🇼", icon: "🐻", name: "台灣健康寶寶", text: "建議您繼續保持這份無懈可擊的完美作息。畢竟明天還要充滿活力地為公司創造價值，真的是太優秀的現代楷模了。" },
            "0": { flag: "🇹🇭", icon: "🐘", name: "曼谷微夜貓", text: "建議您乾脆點份泰式宵夜犒賞自己。既然靈魂捨不得休止，不如就順應這份熱情，好好享受這段專屬的曼谷時光吧。" },
            "2": { flag: "🇦🇪", icon: "🐫", name: "杜拜夢想家", text: "誠摯建議您把過人的深夜精力拿來規劃杜拜之旅。擁有像石油大亨般的不眠體質，不拿來思考如何財富自由太可惜了呢。" },
            "4": { flag: "🇬🇧", icon: "🦁", name: "英倫夜貓貴族", text: "建議您為自己優雅地泡杯伯爵茶。既然生理時鐘已完美與倫敦接軌，就用最從容的姿態，把失眠過成一種貴族日常吧。" },
            "6": { flag: "🇦🇶", icon: "🐧", name: "極地慵懶企鵝", text: "溫馨提醒您睡前記得把冷氣開強一點。成功克服了地球日夜交替，想必只有極地的氣候才能配得上您的超然作息了。" },
            "8": { flag: "🇺🇸", icon: "🦅", name: "華爾街觀察家", text: "強烈建議您立刻下載美股軟體。當大家庸碌地準備上班，您卻優雅互道晚安，這份充滿資本主義氣息的時差真是太高級了。" },
            "10": { flag: "🇲🇽", icon: "🌎", name: "中南美洲狂徒", text: "建議您起床後直接享用塔可餅當早餐。能把日夜顛倒發揮到天花板級別的藝術，您的肝臟想必也充滿拉丁美洲般的彈性呢。" },
            "13": { flag: "🇺🇸", icon: "🦢", name: "好萊塢大明星", text: "貼心建議您出門記得戴上墨鏡。這份一覺睡到下午的頂級巨星作息，沒有配備專屬經紀人來打理，真的是太委屈您的排場了。" },
            "16": { flag: "🌺", icon: "🐢", name: "夏威夷渡假達人", text: "建議您趕緊為自己添購幾件花襯衫。別人在夕陽下拖著疲憊身軀下班，您卻正要進入夢鄉，這份超脫世俗的鬆弛感真令人嚮往喔。" },
            "19": { flag: "🏝️", icon: "🦀", name: "無人島島主", text: "誠懇建議您將手機直接關機。能在晚上七點就放下塵世喧囂，這份看破紅塵的清心寡慾，世間沒幾個人能達到您的境界呢。" }
        };

        twemoji.parse(document.body);

        function calculateResult() {
            const timeVal = document.getElementById('sleep-time').value;
            if (!timeVal) { alert("請先選擇睡覺時間喔！"); return; }

            const data = resultsData[timeVal];

            document.getElementById('input-area').style.display = 'none';
            document.querySelector('.subtitle').style.display = 'none';

            const animFlag = document.getElementById('anim-flag');
            animFlag.innerText = data.flag;
            document.getElementById('animation-stage').style.display = 'block';
            twemoji.parse(animFlag);

            document.getElementById('result-name').innerText = data.name;
            document.getElementById('result-text').innerText = data.text;
            document.getElementById('res-flag').innerText = data.flag;
            document.getElementById('res-icon').innerText = data.icon;
            twemoji.parse(document.getElementById('final-result'));

            setTimeout(() => {
                document.getElementById('animation-stage').style.display = 'none';
                document.getElementById('final-result').style.display = 'block';
            }, 2000); 
        }

        function resetTest() {
            document.getElementById('final-result').style.display = 'none';
            document.getElementById('animation-stage').style.display = 'none';
            document.querySelector('.subtitle').style.display = 'block'; 
            document.getElementById('input-area').style.display = 'block';
            document.getElementById('sleep-time').value = "";
        }
    </script>
</body>
</html>
